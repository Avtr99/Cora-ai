# Dependabot configuration — security updates only, no version-bump spam.
# Scorecard's Dependency-Update-Tool check detects this file and scores 10.
#
# Strategy: open-pull-requests-limit: 0 disables version-update PRs (the
# "package X has a new minor version" noise). Dependabot SECURITY updates
# (fixes for known vulnerabilities) are controlled separately in repo
# Settings → Security → Dependabot, and stay active regardless of this file.
# So you get PRs only when a dependency has a real CVE — not for routine bumps.
#
# To manually check for outdated deps: `uv pip list --outdated` or review
# Dependabot alerts in the GitHub Security tab.
#
# To regenerate lockfiles after a manual version bump:
#   uv pip compile --generate-hashes --python-platform x86_64-unknown-linux-gnu \
#     --python-version 3.11 requirements-core.txt -o requirements-core.lock
#   For ingestion + CI lockfiles, add:
#     --index-strategy unsafe-best-match --extra-index-url https://download.pytorch.org/whl/cpu
#   so torch/torchvision pin to +cpu wheels (matching the Docker image).
#   requirements-ingestion.lock: input = requirements-ingestion.txt
#   requirements-ci.lock: input = requirements-core.txt + requirements-ingestion.txt + requirements-dev.txt
version: 2

updates:
  # Python runtime + ingestion deps.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"

  # Frontend (Vite/React) deps.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions versions in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images (Dockerfile + docker-compose.yml).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "docker"
