    <!-- Critical CSS inlined to eliminate render-blocking ~280ms delay -->
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --primary: 222.2 47.4% 11.2%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96.1%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96.1%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --accent: 210 40% 96.1%;
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 222.2 84% 4.9%;
        --radius: 0.5rem;
        --brand-primary: 243 37% 38%;
        --brand-secondary: 256 55% 55%;
        --brand-link: 256 59% 40%;
        --brand-hover: 255 60% 32%;
      }
      * { border-color: hsl(var(--border)); }
      body { background: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; font-family: Inter, sans-serif; }
      /* 100dvh (dynamic viewport height) tracks the visible area on mobile/tablet
         browsers so the app doesn't overflow below the address bar and create a
         whole-page scroll that drags the sidebar off-screen. Falls back to 100vh
         for older browsers (~3% global usage as of 2025). */
      #root { min-height: 100vh; min-height: 100dvh; }
    </style>

    <!-- Fonts (preconnected for faster loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
